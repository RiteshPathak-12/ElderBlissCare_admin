name: elderbliss_admin

description: "ElderBliss Admin Application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.6
  cloud_firestore: ^4.17.4
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.4

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.5.5

  # App Info
  package_info_plus: ^9.0.1

  # URL Launcher
  url_launcher: ^6.3.2

  # Maps & Location
  google_maps_flutter: ^2.12.3
  geolocator: 12.0.0

  # UI
  flutter_spinkit: ^5.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/

  # Example custom fonts
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700